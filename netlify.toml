[build]
  command = "echo ok"
  publish = "src"
  functions = "netlify/functions"

[dev]
  framework = "#custom"
  command = "echo 'Netlify Dev Mode'"
  targetPort = 3000
  port = 8888

# Webhook de WhatsApp (GET para verificación, POST para mensajes)
[[redirects]]
  from = "/webhook"
  to = "/.netlify/functions/whatsapp-webhook"
  status = 200

[[redirects]]
  from = "/api/orders"
  to = "/.netlify/functions/orders"
  status = 200

[[redirects]]
  from = "/api/clients"
  to = "/.netlify/functions/clients"
  status = 200

[[redirects]]
  from = "/api/catalog"
  to = "/.netlify/functions/catalog"
  status = 200

[[redirects]]
  from = "/api/dashboard"
  to = "/.netlify/functions/dashboard"
  status = 200

[[redirects]]
  from = "/api/sync-sheets"
  to = "/.netlify/functions/sync-sheets"
  status = 200

[[redirects]]
  from = "/api/broadcast"
  to = "/.netlify/functions/broadcast"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/repartidores"
  to = "/.netlify/functions/repartidores"
  status = 200

[[redirects]]
  from = "/api/location-update"
  to = "/.netlify/functions/location-update"
  status = 200

[[redirects]]
  from = "/api/nearby-delivery"
  to = "/.netlify/functions/nearby-delivery"
  status = 200

[[redirects]]
  from = "/api/archive-orders"
  to = "/.netlify/functions/archive-orders"
  status = 200

# Excluir rutas internas de Netlify del fallback
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200
  force = true

# SPA fallback (debe ir al final)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

# Difusión diaria 8am ART (11:00 UTC)
[functions."broadcast"]
  schedule = "0 11 * * *"

# Archivado automático: 1ro de cada mes a las 7am ART (10:00 UTC)
[functions."archive-orders"]
  schedule = "0 10 1 * *"
